<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trains and Time Travel</title>
  </head>
  <body>
    <div id="app-shell">
      <header>
        <h1>Trains and Time Travel</h1>
        <div id="hud"></div>
        <button id="inspect-button" type="button">Inspect a square</button>
        <span id="inspect-status">Use arrow keys or WASD to move.</span>
      </header>
      <main id="game"></main>
      <div id="loop-effect" aria-hidden="true"></div>
      <aside id="log" aria-live="polite" aria-label="Status history"></aside>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
